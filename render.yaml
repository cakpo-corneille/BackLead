version: "1"

# ============================================================
# RENDER.YAML — WiFiLeads Backend
#
# Structure :
#   envVarGroups  → variables partagées web + worker
#   services      → Redis, Web Django, Celery Worker
#
# Deux corrections appliquées :
#   1. fromService requiert un champ "type" (ex: type: redis)
#   2. Le bloc worker était niché dans envVars du web — corrigé
# ============================================================

# ----------------------------------------------------------
# ENVIRONMENT GROUP PARTAGÉ
# Attaché au service web ET au worker pour éviter de
# redéclarer SECRET_KEY, DEBUG, etc. dans les deux endroits.
# ----------------------------------------------------------
envVarGroups:
  - name: wifileads-shared-env
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: DJANGO_SETTINGS_MODULE
        value: config.prod
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false


# ----------------------------------------------------------
# SERVICES — Web, Redis, Worker au même niveau d'indentation
# ----------------------------------------------------------
services:

  # --------------------------------------------------------
  # 1. REDIS
  # --------------------------------------------------------
  - type: redis
    name: backlead-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # --------------------------------------------------------
  # 2. SERVICE WEB — Django + Gunicorn
  # --------------------------------------------------------
  - type: web
    name: backlead-web
    plan: free
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      cd src &&
      python manage.py migrate --noinput &&
      python manage.py create_superuser &&
      python manage.py collectstatic --noinput
    startCommand: cd src && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-file -
    healthCheckPath: /api/health/
    envVars:
      - fromGroup: wifileads-shared-env
      - key: DATABASE_URL
        fromDatabase:
          name: backlead-db
          property: connectionString
      # CORRECTION 1 : fromService requiert "type" pour que Render
      # sache dans quel registre chercher le service référencé.
      - key: REDIS_URL
        fromService:
          name: backlead-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: backlead-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: backlead-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: backlead-web.onrender.com
      - key: WIDGET_SCRIPT_URL
        value: https://backlead-web.onrender.com/static/core_data/widget.min.js

